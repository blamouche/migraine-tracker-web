name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:coverage

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @migraine-ai/desktop exec playwright install --with-deps chromium
      - run: pnpm build
      - run: pnpm --filter @migraine-ai/desktop test:e2e

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: desktop-dist
          path: apps/desktop/dist
      - uses: actions/upload-artifact@v4
        with:
          name: mobile-dist
          path: apps/mobile/dist
      - uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: apps/admin/dist

  deploy-staging:
    name: Deploy Staging (PR Preview)
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: desktop-dist
          path: apps/desktop/dist
      - uses: actions/download-artifact@v4
        with:
          name: mobile-dist
          path: apps/mobile/dist
      - uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: apps/admin/dist
      - run: npm install -g netlify-cli
      - name: Deploy Desktop Preview
        run: netlify deploy --dir=apps/desktop/dist --site=${{ secrets.NETLIFY_SITE_ID_DESKTOP }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
      - name: Deploy Mobile Preview
        run: netlify deploy --dir=apps/mobile/dist --site=${{ secrets.NETLIFY_SITE_ID_MOBILE }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}
      - name: Deploy Admin Preview
        run: netlify deploy --dir=apps/admin/dist --site=${{ secrets.NETLIFY_SITE_ID_ADMIN }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }}

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: desktop-dist
          path: apps/desktop/dist
      - uses: actions/download-artifact@v4
        with:
          name: mobile-dist
          path: apps/mobile/dist
      - uses: actions/download-artifact@v4
        with:
          name: admin-dist
          path: apps/admin/dist
      - run: npm install -g netlify-cli
      - name: Deploy Desktop Production
        run: netlify deploy --dir=apps/desktop/dist --site=${{ secrets.NETLIFY_SITE_ID_DESKTOP }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --prod
      - name: Deploy Mobile Production
        run: netlify deploy --dir=apps/mobile/dist --site=${{ secrets.NETLIFY_SITE_ID_MOBILE }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --prod
      - name: Deploy Admin Production
        run: netlify deploy --dir=apps/admin/dist --site=${{ secrets.NETLIFY_SITE_ID_ADMIN }} --auth=${{ secrets.NETLIFY_AUTH_TOKEN }} --prod
